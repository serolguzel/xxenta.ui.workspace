<dx-data-grid id="gridContainer" 
            [dataSource]="dataSource"
            [remoteOperations]="false"
            [showColumnLines]="false"
            [showBorders]="true"
            [showRowLines]="true"
            [rowAlternationEnabled]="true"
            [hoverStateEnabled]="true"
            [allowColumnResizing]="true"
            [columnHidingEnabled]="false">
          
              <dxo-search-panel [visible]="true"></dxo-search-panel>
              <dxo-filter-row [visible]="true"></dxo-filter-row>
              <dxo-group-panel [visible]="false"></dxo-group-panel>

              <dxo-toolbar>
                <dxi-item location="before">
                  <div *dxTemplate>
                    <div class="text-2xl tracking-tight">
                        {{ 'labels.application' | transloco }}
                    </div>
                  </div>
                </dxi-item>
                <dxi-item name="columnChooserButton" locateInMenu="auto"></dxi-item>
                <dxi-item name="searchPanel" locateInMenu="auto"></dxi-item>
              </dxo-toolbar>


              <dxi-column dataField="organization.name" dataType="string" [caption]="'labels.customer' | transloco"></dxi-column>

              <dxi-column dataField="appId" dataType="string" [caption]="'labels.application' | transloco">
                <dxo-lookup [dataSource]="appsDataSource" valueExpr="id" displayExpr="name"></dxo-lookup>
              </dxi-column>
              <dxi-column dataField="registerDate" dataType="date"></dxi-column>

              <dxo-paging [pageSize]="20"></dxo-paging>
              <dxo-pager 
                [showPageSizeSelector]="true" 
                [showInfo]="true" 
                [allowedPageSizes]="[10, 20, 30]"></dxo-pager>
          </dx-data-grid>
