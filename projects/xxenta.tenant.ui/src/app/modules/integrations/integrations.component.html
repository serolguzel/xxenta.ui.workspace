<div class="p-6">
    <dx-data-grid id="gridContainer" 
    [dataSource]="dataSource"
    [remoteOperations]="false"
    [showColumnLines]="false"
    [showBorders]="true"
    [showRowLines]="true"
    [rowAlternationEnabled]="true"
    [hoverStateEnabled]="true"
    [allowColumnResizing]="true"
    [columnHidingEnabled]="false"
    (onInitNewRow)="onInitNewRow($event)"
    (onEditingStart)="onEditingStart($event)"
    (onRowUpdating)="onRowUpdating($event)"
    (onRowUpdated)="onRowUpdated($event)">
  
      <dxo-search-panel [visible]="true" [placeholder]="'labels.search' | transloco"></dxo-search-panel>
      <dxo-filter-row [visible]="true"></dxo-filter-row>
      <dxo-group-panel [visible]="false"></dxo-group-panel>
  
      <dxo-toolbar>
          <dxi-item location="before">
            <div *dxTemplate>
              <div class="text-2xl tracking-tight">{{ 'labels.integrations' | transloco }}</div>
            </div>
          </dxi-item>
          <dxi-item name="addRowButton" locateInMenu="auto"></dxi-item>
          <dxi-item name="exportButton" locateInMenu="auto"></dxi-item>
          <dxi-item name="searchPanel" locateInMenu="auto"></dxi-item>
        </dxo-toolbar>
        
      <dxo-editing 
        mode="popup"
        [allowUpdating]="true"
        [allowAdding]="true"
        [allowDeleting]="true"
        [useIcons]="true">
        <dxo-popup
            [title]="'labels.integrations' | transloco"
            [showTitle]="true"
            [width]="640"
            [height]="440"
            [resizeEnabled]="true"
            [position]="{ my: 'center', at: 'center'}">
        </dxo-popup>
        <dxo-form [colCount]="1" labelLocation="top" labelMode="floating">
          <dxi-item itemType="group" [colCount]="2">
            <dxi-item dataField="code" [disabled]="isUpdateCode">
              <dxi-validation-rule type="required" [message]="'messages.required' | transloco"></dxi-validation-rule>
            </dxi-item>
            <dxi-item dataField="price" editorType="dxNumberBox"
              [editorOptions]="{ min: 0, showSpinButtons: true, showClearButton: true }">
              <dxi-validation-rule type="required" [message]="'messages.required' | transloco"></dxi-validation-rule>
            </dxi-item>
          </dxi-item>

          <dxi-item dataField="name">
            <dxi-validation-rule type="required" [message]="'messages.required' | transloco"></dxi-validation-rule>
          </dxi-item>
          <dxi-item dataField="description"></dxi-item>
          <dxi-item dataField="icon"></dxi-item>
          <dxi-item dataField="appIds" editorType="dxTagBox" [editorOptions]="{
                  dataSource: appsDataSource,
                  valueExpr: 'id',
                  displayExpr: 'name',
                  searchEnabled: true,
                  showClearButton: true,
                  showSelectionControls: true
                }">
              </dxi-item>
        </dxo-form>
    </dxo-editing>
  
    <dxi-column dataField="code" dataType="string"></dxi-column>
    <dxi-column dataField="name" dataType="string"></dxi-column>
    <dxi-column dataField="price" dataType="number"></dxi-column>
    <dxi-column dataField="description" dataType="string"></dxi-column>
    <dxi-column dataField="icon" dataType="string"></dxi-column>

    <dxi-column dataField="appIds" dataType="array" 
      [allowSorting]="false" 
      [cellTemplate]="'appsTemp'" 
      [caption]="'labels.apps' | transloco"></dxi-column>

     <div class="flex-auto" *dxTemplate="let d of 'appsTemp'">
        <span class="flex text-xs w-full" *ngIf="d.data.apps">
          <badge-taskstatus *ngFor="let f of d.data.apps" textSizeClass="mr-2" [text]="f.name">
          </badge-taskstatus>
        </span>
      </div>
    
    <dxo-paging [pageSize]="10"></dxo-paging>
    <dxo-pager [showPageSizeSelector]="true" [showInfo]="true" [allowedPageSizes]="[10, 20, 30]"></dxo-pager>
    </dx-data-grid>
  </div>
