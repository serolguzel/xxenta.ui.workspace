<div class="p-6">
    <dx-data-grid id="gridContainer" 
    [dataSource]="dataSource"
    [remoteOperations]="false"
    [showColumnLines]="false"
    [showBorders]="true"
    [showRowLines]="true"
    [rowAlternationEnabled]="true"
    [hoverStateEnabled]="true"
    [allowColumnResizing]="false"
    [columnHidingEnabled]="false"
    (onRowUpdating)="onRowUpdating($event)">
  
      <dxo-search-panel [visible]="true" [placeholder]="'labels.search' | transloco"></dxo-search-panel>
      <dxo-filter-row [visible]="true"></dxo-filter-row>
      <dxo-group-panel [visible]="false"></dxo-group-panel>
  
      <dxo-toolbar>
          <dxi-item location="before">
            <div *dxTemplate>
              <div class="text-2xl tracking-tight">
                {{ 'labels.configurations' | transloco }}
              </div>
            </div>
          </dxi-item>
          <dxi-item name="addRowButton" locateInMenu="auto"></dxi-item>
          <dxi-item name="exportButton" locateInMenu="auto"></dxi-item>
          <dxi-item name="searchPanel" locateInMenu="auto"></dxi-item>
        </dxo-toolbar>
        
      <dxo-editing 
        mode="popup"
        [allowUpdating]="true"
        [allowAdding]="true"
        [allowDeleting]="true"
        [useIcons]="true">
        <dxo-popup
            [title]="'labels.configurations' | transloco"
            [showTitle]="true"
            [width]="640"
            [height]="400"
            [resizeEnabled]="true"
            [position]="{ my: 'center', at: 'center'}">
        </dxo-popup>
        <dxo-form [colCount]="1" labelLocation="top" labelMode="floating">
          <dxi-item itemType="group" colCount="2" colSpan="2">
            <dxi-item dataField="organizationId" editorType="dxLookup" [editorOptions]="customerLookUpOptions">
              <dxi-validation-rule type="required" [message]="'messages.required' | transloco"></dxi-validation-rule>
            </dxi-item>
            <dxi-item dataField="integrationId" editorType="dxLookup" [editorOptions]="integrationDataSource">
              <dxi-validation-rule type="required" [message]="'messages.required' | transloco"></dxi-validation-rule>
            </dxi-item>
          </dxi-item>
        
          <dxi-item dataField="key">
            <dxi-validation-rule type="required" [message]="'messages.required' | transloco"></dxi-validation-rule>
          </dxi-item>
           <dxi-item dataField="value">
            <dxi-validation-rule type="required" [message]="'messages.required' | transloco"></dxi-validation-rule>
          </dxi-item>

        
          <dxi-item dataField="isDefault" dataType="boolean"></dxi-item>
        </dxo-form>
    </dxo-editing>
  
    <dxi-column dataField="organization.name" dataType="string" [caption]="'labels.organization' | transloco"></dxi-column>
    <dxi-column dataField="integration.name" dataType="string"></dxi-column>
    
    <dxi-column dataField="key" dataType="string"></dxi-column>
    <dxi-column dataField="value" dataType="string"></dxi-column>
    
    <dxi-column dataField="isDefault" dataType="boolean"></dxi-column>
    <dxi-column dataField="organizationId" dataType="string" [visible]="false" [caption]="'labels.organization' | transloco"></dxi-column>
    <dxi-column dataField="integrationId" dataType="string" [visible]="false"></dxi-column>

    <dxo-paging [pageSize]="20"></dxo-paging>
    <dxo-pager [showPageSizeSelector]="true" [showInfo]="true" [allowedPageSizes]="[10, 20, 30]"></dxo-pager>
    </dx-data-grid>
  </div>
