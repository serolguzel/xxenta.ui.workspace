<!-- Flippable card -->
<ng-container *ngIf="flippable">

    <!-- Front -->
    <div class="genesis-card-front">
        <ng-content select="[genesisCardFront]"></ng-content>
    </div>

    <!-- Back -->
    <div class="genesis-card-back">
        <ng-content select="[genesisCardBack]"></ng-content>
    </div>

</ng-container>

<!-- Normal card -->
<ng-container *ngIf="!flippable">

    <!-- Content -->
    <ng-content></ng-content>

    <!-- Expansion -->
    <div
        class="genesis-card-expansion"
        *ngIf="expanded"
        [@expandCollapse]>
        <ng-content select="[genesisCardExpansion]"></ng-content>
    </div>

</ng-container>
