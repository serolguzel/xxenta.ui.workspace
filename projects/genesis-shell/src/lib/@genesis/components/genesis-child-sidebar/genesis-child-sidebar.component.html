<mat-drawer-container class="flex-auto h-full">
    <mat-drawer
        class="w-72 dark:bg-gray-900"
        [autoFocus]="false"
        [mode]="drawerMode"
        [opened]="drawerOpened"
        #matDrawer>
        <ng-content select="[childTopContent]"></ng-content>
        <child-sidebar
            [MenuData]="MenuData"
            [SidebarTitle]="SidebarTitle"
            [ShowSidebarTitle]="ShowSidebarTitle"></child-sidebar>
        <ng-content select="[childBottomContent]"></ng-content>
    </mat-drawer>

    <!-- Drawer content -->
    <mat-drawer-content class="flex flex-col overflow-hidden">
        <!-- Header -->
        <div class="flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between p-4 sm:py-4 sm:px-10 border-b bg-card dark:bg-transparent">
            <!-- Actions -->
            <div class="flex w-full shrink-0 items-center justify-between">
                <div class="flex-1 min-w-0">
                    <genesis-breadcrumbs
                        [Breadcrumbs]="Breadcrumbs"
                        class="flex"></genesis-breadcrumbs>
                </div>
                <div>
                    <button mat-icon-button (click)="matDrawer.toggle()">
                        <mat-icon [svgIcon]="'heroicons_outline:bars-3'"></mat-icon>
                    </button>
                </div>
            </div>
        </div>
        <!-- Content -->
        <div
            class="flex-auto overflow-y-auto"
            [ngClass]="{
                'bg-white': IsBgWhite,
                'py-4 px-6 sm:p-10': IsDefaultPadding,
            }"
            cdkScrollable>
            <router-outlet></router-outlet>
        </div>
    </mat-drawer-content>
</mat-drawer-container>
