<!-- Loading bar -->
<genesis-loading-bar [autoMode]="true"></genesis-loading-bar>

<!-- Navigation -->
<genesis-vertical-navigation class="light bg-gray-100 print:hidden" [mode]="isScreenSmall ? 'over' : 'side'"
  [name]="'mainNavigation'" [navigation]="navigation.default" [opened]="!isScreenSmall">
  <!-- Navigation header hook -->
  <ng-container genesisVerticalNavigationContentHeader>
    <div class="flex items-center w-full p-4 pl-6">
      <!-- Logo -->
      <div class="flex items-center justify-center">
        <img class="h-8 mr-2" *ngIf="appConfig.sideBarLogo" [src]="appConfig.sideBarLogo" />
        <span class="text-2xl" *ngIf="appConfig.sideBarCompanyName">
          {{ appConfig.sideBarCompanyName }}
        </span>
      </div>
      <!-- Components -->
      <!-- <div class="flex items-center ml-auto">
        <user [showAvatar]="true"></user>
      </div> -->
    </div>
    <!-- User -->
    <div class="flex flex-col items-center w-full p-4">
      <div class="relative w-24 h-24">
        <img class="w-full h-full rounded-full" *ngIf="user.picture" [src]="user.picture" alt="User avatar" />
        <mat-icon class="icon-size-24" *ngIf="!user.picture" [svgIcon]="'heroicons_solid:user-circle'"></mat-icon>
      </div>
      <div class="flex flex-col items-center justify-center w-full mt-6">
        <div class="w-full whitespace-nowrap text-ellipsis overflow-hidden text-center leading-normal font-medium">
          {{ user.displayName }}
        </div>
        <div class="w-full mt-0.5 whitespace-nowrap text-ellipsis overflow-hidden text-center text-md leading-normal font-medium text-secondary">
          {{ user.email ?? user.userName }}
        </div>
        <div *ngIf="user.company" class="w-full mt-0.5 whitespace-nowrap text-ellipsis overflow-hidden text-center text-md leading-normal font-medium text-secondary">
          {{ user.company }}
        </div>
      </div>
    </div>
  </ng-container>
  <!-- Navigation footer hook -->
  <ng-container genesisVerticalNavigationContentFooter>
    <div class="flex flex-0 items-center justify-center h-16 pr-6 pl-2 mt-2 mb-4 opacity-12">
      <img class="max-w-36" [src]="appConfig.sideBarFlueLogo" />
    </div>
  </ng-container>
</genesis-vertical-navigation>

<!-- Wrapper -->
<div class="flex flex-col flex-auto w-full min-w-0">
  <!-- Header -->
  <div
    class="relative flex flex-0 items-center w-full h-16 px-4 md:px-6 z-49 shadow dark:shadow-none dark:border-b bg-card dark:bg-transparent print:hidden">
    <!-- Navigation toggle button -->
    <button mat-icon-button (click)="toggleNavigation('mainNavigation')">
      <mat-icon [svgIcon]="'heroicons_outline:bars-3'"></mat-icon>
    </button>
    <!-- Components -->
    <div class="flex items-center pl-2 ml-auto space-x-0.5 sm:space-x-2">
      <search [appearance]="'bar'" *ngIf="appConfig.showSearch"></search>
      <invitation *ngIf="appConfig.showInvitation"></invitation>
      <notifications *ngIf="appConfig.showNotification"></notifications>
      <applications *ngIf="appConfig.showApps && isAppsPanel"></applications>
      <shortcuts *ngIf="appConfig.showShortcut"></shortcuts>
      <user></user>
      <languages *ngIf="appConfig.showLanguage"></languages>
      <genesis-chat-agent *ngIf="appConfig.showChatAgent"></genesis-chat-agent>
      
      <!-- 
            <genesis-fullscreen class="hidden md:block"></genesis-fullscreen>
            <messages></messages>
            <button
                class="lg:hidden"
                mat-icon-button
                (click)="quickChat.toggle()">
                <mat-icon [svgIcon]="'heroicons_outline:chat-bubble-left-right'"></mat-icon>
            </button> -->
    </div>
  </div>

  <!-- Content -->
  <div class="flex flex-col flex-auto bg-white content-area">
    <!-- *ngIf="true" hack is required here for router-outlet to work correctly.
             Otherwise, layout changes won't be registered and the view won't be updated! -->
    <router-outlet *ngIf="true"></router-outlet>
  </div>

  <!-- Footer -->
  <!--<div class="relative flex flex-0 items-center justify-start w-full h-14 px-4 md:px-6 z-49 border-t bg-card dark:bg-transparent print:hidden">
        <span class="font-medium text-secondary">genesis &copy; {{currentYear}}</span>
    </div>-->
</div>
